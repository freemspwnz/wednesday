name: CI Pipeline

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  PYTHON_VERSION: "3.12"
  COMPOSE_PROJECT: wednesday_test
  COMPOSE_FILE: tests/docker-compose.test.yml
  COMPOSE_ENV: tests/.env.test

jobs:
  # ============================================================================
  # Линтинг и проверка форматирования (параллельно)
  # ============================================================================

  lint:
    uses: ./.github/workflows/jobs/lint-check.yml
    with:
      python-version: ${{ env.PYTHON_VERSION }}

  format:
    uses: ./.github/workflows/jobs/format-check.yml
    with:
      python-version: ${{ env.PYTHON_VERSION }}

  mypy:
    uses: ./.github/workflows/jobs/mypy-check.yml
    with:
      python-version: ${{ env.PYTHON_VERSION }}

  actionlint:
    uses: ./.github/workflows/jobs/actionlint-check.yml

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/jobs/dependency-review.yml

  # ============================================================================
  # Дополнительные проверки (параллельно с тестами)
  # ============================================================================

  prometheus:
    uses: ./.github/workflows/jobs/prometheus-check.yml

  loki-dashboards:
    uses: ./.github/workflows/jobs/loki-dashboards-check.yml

  # ============================================================================
  # Унифицированный набор всех Pytest тестов
  # ============================================================================

  pytest-full:
    uses: ./.github/workflows/jobs/pytest-full.yml
    with:
      python_version: ${{ env.PYTHON_VERSION }}
      compose_project: ${{ env.COMPOSE_PROJECT }}
      compose_file: ${{ env.COMPOSE_FILE }}
      compose_env: ${{ env.COMPOSE_ENV }}
      is_release: ${{ startsWith(github.ref, 'refs/tags/v') }}

  # ============================================================================
  # Объединение результатов тестов
  # ============================================================================

  coverage-merge:
    uses: ./.github/workflows/jobs/coverage-merge.yml
    needs: [pytest-full]
    if: always()
    with:
      python_version: ${{ env.PYTHON_VERSION }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  junit-merge:
    uses: ./.github/workflows/jobs/junit-merge.yml
    needs: [pytest-full]
    if: always()
    with:
      python_version: ${{ env.PYTHON_VERSION }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Docker Build (только для тегов)
  # ============================================================================

  docker-build:
    name: Build Docker image (release only)
    needs: [lint, format, mypy, actionlint, pytest-full, prometheus, loki-dashboards]
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/jobs/docker-build.yml
    with:
      image-name: wednesday-bot
