name: Coverage Merge

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  coverage-merge:
    name: Merge Coverage
    runs-on: ubuntu-latest
    env:
      POETRY_VERSION: "1.8.4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "poetry"

      - name: Install Poetry
        run: pipx install "poetry==${POETRY_VERSION}"

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Download coverage-all artifact
        uses: actions/download-artifact@v4
        with:
          name: coverage-all
          path: coverage-files
          if-no-files-found: ignore

      - name: Copy coverage files
        run: |
          echo "=== Копирование файлов покрытия ==="
          find coverage-files -name ".coverage.*" -type f -exec cp {} . \;
          ls -la .coverage.* 2>/dev/null || echo "Файлы покрытия не найдены"

      - name: Check coverage inputs
        id: coverage-inputs
        run: |
          if ls .coverage* >/dev/null 2>&1; then
            echo "has_coverage=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_coverage=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge coverage
        if: steps.coverage-inputs.outputs.has_coverage == 'true'
        env:
          HOST_REPO_ROOT: ${{ github.workspace }}
        run: |
          # Исправляем пути в coverage файлах
          for f in .coverage*; do
            if [ -f "$f" ]; then
              echo "Исправление путей в $f"
              poetry run python scripts/fix_coverage_paths.py "$f" || true
            fi
          done

          # Объединяем coverage файлы
          poetry run coverage combine .coverage* || true

          # Генерируем XML и отчет
          poetry run coverage xml -o coverage.xml --ignore-errors || true
          poetry run coverage report --fail-under=50 --ignore-errors || true

      - name: Upload merged coverage
        uses: codecov/codecov-action@v5
        if: always() && steps.coverage-inputs.outputs.has_coverage == 'true'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage.xml
          flags: merged
          fail_ci_if_error: false

      - name: Upload coverage XML artifact
        uses: actions/upload-artifact@v4
        if: always() && steps.coverage-inputs.outputs.has_coverage == 'true'
        with:
          name: coverage-merged
          path: coverage.xml
          retention-days: 7
