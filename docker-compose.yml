  wednesday:
    image: wednesday:latest
    container_name: wednesday
    restart: unless-stopped
    read_only: true       # for nobody to change files in runtime
    tmpfs:                # for ability to write temp files for app itself
      - /tmp              # Временные файлы Python, tempfile
      - /var/tmp          # Дополнительные временные файлы
      - /root/.cache      # Кеши Python библиотек (если запускается от root)
      - /run              # PID файлы, сокеты
    # depends_on:
    #   postgres:
    #     condition: service_healthy
    #   redis:
    #     condition: service_healthy
    env_file:
      - .env
    environment:
      PYTHONDONTWRITEBYTECODE: "1"
    networks:
      - wednesday
    expose:
      - "${METRICS_PORT:-8000}"
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 512m
        reservations:
          cpus: "0.5"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# volumes:
