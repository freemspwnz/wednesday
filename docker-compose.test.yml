services:
  postgres_test:
    image: postgres:16-alpine
    container_name: wednesday_postgres_test
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password_ci_2024
      POSTGRES_DB: wednesdaydb_test
      # Прокидываем переменную для единообразия окружения с боевым docker-compose.
      # В тестовом окружении HTTP‑экспортёр не запускается, но переменная
      # доступна для интеграционных тестов и future‑service'ов.
      PROMETHEUS_EXPORTER_PORT: ${PROMETHEUS_EXPORTER_PORT:-8000}
      # Порт healthcheck используется для выравнивания окружения с продом.
      HEALTHCHECK_PORT: ${HEALTHCHECK_PORT:-8080}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U test_user -d wednesdaydb_test"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data  # Используем tmpfs для быстрой очистки после тестов

  redis_test:
    image: redis:7-alpine
    container_name: wednesday_redis_test
    environment:
      PROMETHEUS_EXPORTER_PORT: ${PROMETHEUS_EXPORTER_PORT:-8000}
      HEALTHCHECK_PORT: ${HEALTHCHECK_PORT:-8080}
      # Для выравнивания окружения с боевым docker-compose:
      IMAGE_MODEL_BACKEND: ${IMAGE_MODEL_BACKEND:-kandinsky}
      TEXT_MODEL_BACKEND: ${TEXT_MODEL_BACKEND:-gigachat}
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /data  # Используем tmpfs для быстрой очистки после тестов

  celery-worker-test:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: wednesday_celery_worker_test
    restart: "no"
    depends_on:
      postgres_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password_ci_2024
      POSTGRES_DB: wednesdaydb_test
      POSTGRES_HOST: postgres_test  # Внутри docker network
      POSTGRES_PORT: 5432
      REDIS_HOST: redis_test  # Внутри docker network
      REDIS_PORT: 6379
      REDIS_DB: 0
      REDIS_URL: ${REDIS_URL:-}
      # Тестовый Celery app использует отдельную переменную окружения,
      # чтобы не зависеть от боевого utils.redis_client/get_redis_url
      CELERY_TEST_REDIS_URL: redis://redis_test:6379/1
      TELEGRAM_BOT_TOKEN: test-token
      KANDINSKY_API_KEY: test-api
      KANDINSKY_SECRET_KEY: test-secret
      CHAT_ID: 12345
      ADMIN_CHAT_ID: 54321
      GIGACHAT_AUTHORIZATION_KEY: ZmFrZS1rZXk=
      SCHEDULER_SEND_TIMES: "09:00,12:00,18:00"
      SCHEDULER_WEDNESDAY_DAY: "2"
      SCHEDULER_TZ: "Europe/Moscow"
      TZ: "Europe/Moscow"
      TESTING: "1"  # Для логирования только в stdout и тестовых очередей
      IMAGE_MODEL_BACKEND: ${IMAGE_MODEL_BACKEND:-kandinsky}
      TEXT_MODEL_BACKEND: ${TEXT_MODEL_BACKEND:-gigachat}
    networks:
      - default
    volumes:
      - .:/app
    # ⚠️ КРИТИЧНО: Healthcheck обязателен (нельзя удалять полностью).
    # Теперь он проверяет не только наличие процесса, но и реальную готовность Celery worker'а.
    # Используем минимально «глупую» проверку через Celery CLI:
    #   celery -A tests.common.celery_app_test inspect ping
    # Pytest fixture дополняет, но не заменяет этот healthcheck.
    healthcheck:
      test: ["CMD-SHELL", "celery -A tests.common.celery_app_test inspect ping --timeout=2 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s

  tests:
    build:
      context: .
      dockerfile: Dockerfile.test
    container_name: wednesday_tests
    restart: "no"
    depends_on:
      postgres_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
      celery-worker-test:
        condition: service_healthy
    environment:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password_ci_2024
      POSTGRES_DB: wednesdaydb_test
      POSTGRES_HOST: postgres_test
      POSTGRES_PORT: 5432
      REDIS_HOST: redis_test
      REDIS_PORT: 6379
      REDIS_DB: 0
      # Явно задаём URL Redis, чтобы избежать fallback'а на localhost.
      REDIS_URL: redis://redis_test:6379/0
      # Для Celery явно задаём брокер и backend на redis_test.
      CELERY_BROKER_URL: redis://redis_test:6379/0
      CELERY_RESULT_BACKEND: redis://redis_test:6379/0
      CELERY_TEST_REDIS_URL: redis://redis_test:6379/1
      TELEGRAM_BOT_TOKEN: test-token
      KANDINSKY_API_KEY: test-api
      KANDINSKY_SECRET_KEY: test-secret
      CHAT_ID: 12345
      ADMIN_CHAT_ID: 54321
      GIGACHAT_AUTHORIZATION_KEY: ZmFrZS1rZXk=
      SCHEDULER_SEND_TIMES: "09:00,12:00,18:00"
      SCHEDULER_WEDNESDAY_DAY: "2"
      SCHEDULER_TZ: "Europe/Moscow"
      TZ: "Europe/Moscow"
      TESTING: "1"
      IMAGE_MODEL_BACKEND: ${IMAGE_MODEL_BACKEND:-kandinsky}
      TEXT_MODEL_BACKEND: ${TEXT_MODEL_BACKEND:-gigachat}
      PYTHONPATH: /app
    working_dir: /app
    volumes:
      - .:/app
    networks:
      - default
    # Команда по умолчанию будет переопределяться через `docker compose run tests ...`
    # Поэтому оставляем её по умолчанию из Dockerfile.test (Celery worker) и всегда
    # передаём явный `pytest ...` в командах Makefile/скриптов.

volumes:
  frog_images:
  logs:
  prompt_storage:
