services:
  postgres_test:
    image: postgres:16-alpine
    container_name: wednesday_postgres_test
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wednesdaydb_test}
    expose:
      - "5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-test_user} -d ${POSTGRES_DB:-wednesdaydb_test}"]
      interval: 2s
      timeout: 5s
      retries: 10
    tmpfs:
      - /var/lib/postgresql/data
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.1"
          memory: 128m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  redis_test:
    image: redis:7-alpine
    container_name: wednesday_redis_test
    expose:
      - "6379"
    healthcheck:
      test: ["CMD", "redis-cli", "--raw", "ping"]
      interval: 2s
      timeout: 3s
      retries: 10
      start_period: 2s
    tmpfs:
      - /data
    deploy:
      resources:
        limits:
          cpus: "0.4"
          memory: 256m
        reservations:
          cpus: "0.1"
          memory: 64m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  celery-worker-test:
    build:
      context: ..
      dockerfile: tests/Dockerfile.test
    container_name: wednesday_celery_worker_test
    restart: "no"
    depends_on:
      postgres_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wednesdaydb_test}
      POSTGRES_HOST: postgres_test
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: redis_test
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_URL: ${REDIS_URL:-redis://redis_test:6379/0}
      CELERY_TEST_REDIS_URL: ${CELERY_TEST_REDIS_URL:-redis://redis_test:6379/1}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-dummy_token}
      KANDINSKY_API_KEY: ${KANDINSKY_API_KEY:-dummy_key}
      KANDINSKY_SECRET_KEY: ${KANDINSKY_SECRET_KEY:-dummy_secret}
      CHAT_ID: ${CHAT_ID:-0}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-0}
      GIGACHAT_AUTHORIZATION_KEY: ${GIGACHAT_AUTHORIZATION_KEY:-dummy_key}
      SCHEDULER_SEND_TIMES: ${SCHEDULER_SEND_TIMES:-09:00,12:00,18:00}
      SCHEDULER_WEDNESDAY_DAY: ${SCHEDULER_WEDNESDAY_DAY:-2}
      SCHEDULER_TZ: ${SCHEDULER_TZ:-Europe/Moscow}
      TZ: ${TZ:-Europe/Moscow}
      TESTING: "1"
      IMAGE_MODEL_BACKEND: ${IMAGE_MODEL_BACKEND:-kandinsky}
      TEXT_MODEL_BACKEND: ${TEXT_MODEL_BACKEND:-gigachat}
    networks:
      - default
    volumes:
      - ../:/app
    healthcheck:
      test: ["CMD-SHELL", "celery -A tests.common.celery_app_test inspect ping --timeout=2 >/dev/null 2>&1 || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5
      start_period: 10s
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 512m
        reservations:
          cpus: "0.25"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  tests:
    build:
      context: ..
      dockerfile: tests/Dockerfile.test
    container_name: wednesday_tests
    restart: "no"
    # Явно переопределяем CMD из Dockerfile.test (Celery worker) на pytest
    command: ["pytest", "--color=yes", "--disable-warnings"]
    depends_on:
      postgres_test:
        condition: service_healthy
      redis_test:
        condition: service_healthy
      celery-worker-test:
        condition: service_healthy
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-test_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-wednesdaydb_test}
      POSTGRES_HOST: postgres_test
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      REDIS_HOST: redis_test
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_URL: ${REDIS_URL:-redis://redis_test:6379/0}
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis_test:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis_test:6379/0}
      CELERY_TEST_REDIS_URL: ${CELERY_TEST_REDIS_URL:-redis://redis_test:6379/1}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-dummy_token}
      KANDINSKY_API_KEY: ${KANDINSKY_API_KEY:-dummy_key}
      KANDINSKY_SECRET_KEY: ${KANDINSKY_SECRET_KEY:-dummy_secret}
      CHAT_ID: ${CHAT_ID:-0}
      ADMIN_CHAT_ID: ${ADMIN_CHAT_ID:-0}
      GIGACHAT_AUTHORIZATION_KEY: ${GIGACHAT_AUTHORIZATION_KEY:-dummy_key}
      SCHEDULER_SEND_TIMES: ${SCHEDULER_SEND_TIMES:-09:00,12:00,18:00}
      SCHEDULER_WEDNESDAY_DAY: ${SCHEDULER_WEDNESDAY_DAY:-2}
      SCHEDULER_TZ: ${SCHEDULER_TZ:-Europe/Moscow}
      TZ: ${TZ:-Europe/Moscow}
      TESTING: "1"
      IMAGE_MODEL_BACKEND: ${IMAGE_MODEL_BACKEND:-kandinsky}
      TEXT_MODEL_BACKEND: ${TEXT_MODEL_BACKEND:-gigachat}
      PYTHONPATH: /app
    working_dir: /app
    volumes:
      - ../:/app
    networks:
      - default
    deploy:
      resources:
        limits:
          cpus: "0.75"
          memory: 768m
        reservations:
          cpus: "0.25"
          memory: 256m
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
