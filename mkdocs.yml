# Плагины
plugins:
  # - link-check
  - search
  - mkdocstrings:
      default_handler: python
      handlers:
        python:
          # Путь к исходному коду (модули находятся в корне проекта)
          paths: [.]
          options:
            # Стиль docstrings (Google/Numpy)
            docstring_style: google
            # Показывать заголовок корневого модуля
            show_root_heading: true
            # Не показывать полный путь в заголовке
            show_root_full_path: false
            # Не показывать члены, не входящие в объект
            show_root_members_not_in_object: false
            # Не показывать корневой элемент в TOC
            show_root_toc_entry: false
            # Показывать заголовки категорий
            show_category_heading: true
            # Порядок членов как в исходном коде
            members_order: source
            # Показывать исходный код
            show_source: true
            # Группировать по категориям
            group_by_category: true
            # Показывать подписи типов
            show_signature_annotations: true
            # Разделитель для путей
            docstring_section_style: table

# Дополнительные настройки
markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - admonition
  - pymdownx.details
  - pymdownx.tabbed:
      alternate_style: true
  - tables
  - attr_list
  - md_in_html

# Игнорируемые файлы
exclude_docs: |
  dev/
  sql/
