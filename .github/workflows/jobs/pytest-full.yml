name: Pytest Full Suite

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
      compose_project:
        required: true
        type: string
      compose_file:
        required: true
        type: string
      compose_env:
        required: true
        type: string
      is_release:
        required: true
        type: boolean

permissions:
  contents: read

jobs:
  pytest-full:
    name: All Pytest Tests
    runs-on: ubuntu-latest
    env:
      POETRY_VERSION: "1.8.4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: "poetry"

      - name: Install Poetry
        run: pipx install "poetry==${POETRY_VERSION}"

      - name: Install dependencies
        run: |
          poetry install --with dev --no-interaction

      - name: Run tests
        env:
          COVERAGE_FILE: ".coverage"
        run: |
          poetry run pytest tests/domain/user tests/domain/kernel \
            --cov=wednesday/domain/user \
            --cov=wednesday/domain/kernel \
            --cov-report=xml:coverage.xml \
            --cov-report=term-missing \
            --junitxml=junit-domain.xml

      - name: Upload coverage-all artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-all
          path: |
            .coverage.*
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload junit-all artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-all
          path: |
            junit-*.xml
          retention-days: 1
          if-no-files-found: ignore
