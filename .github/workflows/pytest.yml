name: Pytest Full Suite

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string

permissions:
  contents: read

jobs:
  pytest:
    name: All Pytest Tests
    runs-on: ubuntu-latest
    env:
      POETRY_VERSION: "1.8.4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: |
          poetry install --with dev --no-interaction

      - name: Run tests
        env:
          COVERAGE_FILE: ".coverage"
        run: make test-cov

      - name: Upload coverage-all artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-all
          path: |
            .coverage*
          retention-days: 1
          if-no-files-found: ignore

      - name: Upload junit-all artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-all
          path: |
            junit-*.xml
          retention-days: 1
          if-no-files-found: ignore
