server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: wednesday-json-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: wednesday-json-logs
          service: wednesday-bot
          env: dev
          __path__: /app/logs/wednesday_bot.events.jsonl
    pipeline_stages:
      # 1. Парсим корневой JSON и извлекаем record как объект
      # ВАЖНО: Promtail создаёт новое поле record как объект, который затем используется в source: record
      # Без этого этапа Promtail не сможет развернуть вложенный объект record
      - json:
          expressions:
            record: record
      # 2. Извлекаем поля из объекта record
      - json:
          source: record
          expressions:
            time: time.repr  # Используем time.repr (ISO8601/RFC3339 строка) для надежного парсинга
            level_name: level.name  # Извлекаем строковое имя уровня из объекта level
            message: message
            extra: extra
      # 3. Устанавливаем timestamp из time.repr (формат RFC3339/ISO8601)
      - timestamp:
          source: time
          format: RFC3339
      # 4. Поднимаем стабильные labels низкой кардинальности
      - labels:
          level_name:  # Используем level_name вместо level для совместимости с объектом
          service:
          env:
      # 5. Извлекаем поля из extra (если extra существует)
      # Если extra отсутствует или пуст, этот stage просто не создаст поля, что корректно
      - json:
          source: extra
          expressions:
            event: event
            status: status
            user_id: user_id
            prompt_hash: prompt_hash
            latency_ms: latency_ms
      # 6. Поднимаем event и status в labels
      # Promtail автоматически пропускает пустые/отсутствующие labels
      # Для записей без extra или без event/status эти labels просто не будут созданы
      - labels:
          event:
          status:
      # high-cardinality поля (user_id, prompt_hash и др.) остаются полями поиска,
      # а не labels, чтобы не раздувать кардинальность в Loki.
