# Pre-commit hooks для Wednesday.
# Python quality (ruff, mypy) — через Makefile и Poetry (те же цели, что в CI).
#
# Установка:
#   pre-commit install
#   pre-commit install --hook-type pre-push

minimum_pre_commit_version: "3.5.0"
default_stages: [pre-commit]
default_language_version:
  python: python3.12
fail_fast: false

# Exclude service directories (virtual environments, migrations, cache, etc.)
exclude: |
  (?x)(
    ^migrations/ |
    ^\.?venv/ |
    ^env/ |
    ^venv/ |
    ^data/ |
    ^logs/ |
    ^tmp/ |
    __pycache__/ |
    \.ruff_cache/ |
    \.mypy_cache/
  )

repos:
  # ---------------------------
  # Basic file checks (YAML, JSON, size, conflicts)
  # ---------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: check-added-large-files
        name: Check for large files
        args: ["--maxkb=1024"]

      - id: check-merge-conflict
        name: Check for merge conflicts

      - id: check-yaml
        name: Check YAML syntax
        args: ["--unsafe"]

      - id: check-json
        name: Check JSON syntax

      - id: end-of-file-fixer
        name: Fix end of files

      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]

      - id: detect-private-key
        name: Detect private keys

  # ---------------------------
  # .env syntax and duplicates
  # ---------------------------
  - repo: https://github.com/dotenv-linter/dotenv-linter
    rev: v4.0.0
    hooks:
      - id: dotenv-linter
        args: ["check"]
        name: Dotenv linter
        files: "^\\.env$|^\\.env\\.(example|local|production)$"

  # ---------------------------
  # Gitleaks: secrets in the repository
  # ---------------------------
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: Gitleaks secret scanner
        pass_filenames: false

  # ---------------------------
  # Python: Makefile / Poetry (parity with CI)
  # ---------------------------
  - repo: local
    hooks:
      # pre-commit: apply ruff --fix + format on project PATHS (may touch unstaged files)
      - id: make-format
        name: make format
        entry: make format
        language: system
        pass_filenames: false
        files: \.(py|toml)$
        stages: [pre-commit]

      # pre-push: same checks as GitHub Actions
      - id: make-lint
        name: make lint
        entry: make lint
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: make-format-check
        name: make format-check
        entry: make format-check
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: make-type
        name: make type
        entry: make type
        language: system
        pass_filenames: false
        stages: [pre-push]

      - id: pytest-pre-push
        name: Run pytest with coverage before push
        entry: make test-cov
        language: system
        pass_filenames: false
        stages: [pre-push]
