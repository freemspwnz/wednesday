site_name: Wednesday Frog Bot Documentation
site_description: Документация для Telegram-бота Wednesday Frog с автоматической генерацией изображений
site_author: Wednesday Frog Team
# site_url: https://github.com/Freemspwnz/wednesday

# Настройка темы Material
theme:
  name: material
  palette:
    - scheme: default
      primary: green
      accent: green
      toggle:
        icon: material/brightness-7
        name: Переключить на темную тему
    - scheme: slate
      primary: green
      accent: green
      toggle:
        icon: material/brightness-4
        name: Переключить на светлую тему
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.annotate
    - content.code.copy
  language: ru

# Навигация
nav:
  - Главная: index.md
  - Установка: INSTALLATION.md
  - Развертывание: DEPLOYMENT.md
  - Архитектура: ARCHITECTURE.md
  - Справочник API (Авто): API_REFERENCE_AUTO.md
  - Справочник API (Ручной): API_REFERENCE.md
  - Мониторинг: MONITORING.md
  - Тестирование: TESTING_GUIDE.md
  - Типизация: TYPING_GUIDE.md
  - История изменений: CHANGELOG.md
  - Тесты: tests/README.md
  - Обзор проекта: PROJECT_SUMMARY.md
  - Логи и метрики:
    - Loki/Promtail: LOKI_PROMTAIL_SCHEMA.md
  - Release Notes:
    - release-notes/v6.8.0.md
    - release-notes/v6.7.13.md
    - release-notes/v6.7.12.md
    - release-notes/v6.7.11.md
    - release-notes/v6.7.10.md
    - release-notes/v6.7.9.md
    - release-notes/v6.7.8.md
    - release-notes/v6.7.7.md
    - release-notes/v6.7.6.md
