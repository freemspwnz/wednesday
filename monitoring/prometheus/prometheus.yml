global:
  scrape_interval: 15s
  scrape_timeout: 10s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/rules/*.yml

scrape_configs:
  - job_name: bot
    honor_labels: true
    metrics_path: /metrics
    static_configs:
      - targets: ["bot:8000"]
        labels:
          service: bot

  - job_name: celery-worker
    honor_labels: true
    metrics_path: /metrics
    static_configs:
      - targets: ["celery-worker:8000"]
        labels:
          service: celery-worker

  - job_name: celery-beat
    honor_labels: true
    metrics_path: /metrics
    static_configs:
      - targets: ["celery-beat:8000"]
        labels:
          service: celery-beat
