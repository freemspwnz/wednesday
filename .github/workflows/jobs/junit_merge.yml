name: JUnit Merge

on:
  workflow_call:
    inputs:
      python_version:
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        required: false

jobs:
  junit-merge:
    name: Merge JUnit Results
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python_version }}
          cache: "pip"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Download junit-all artifact
        uses: actions/download-artifact@v4
        with:
          name: junit-all
          path: junit-files

      - name: Copy junit files
        run: |
          echo "=== Копирование JUnit файлов ==="
          find junit-files -name "junit-*.xml" -type f -exec cp {} . \;
          ls -la junit-*.xml 2>/dev/null || echo "JUnit файлы не найдены"

      - name: Merge JUnit XML
        env:
          HOST_REPO_ROOT: ${{ github.workspace }}
        run: |
          python scripts/merge_junit.py junit.xml

      - name: Upload merged junit
        uses: codecov/test-results-action@v1
        if: ${{ !cancelled() }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml

      - name: Upload junit XML artifact
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: junit-merged
          path: junit.xml
          retention-days: 7
