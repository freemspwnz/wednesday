# Pre-commit hooks configuration для Wednesday
# All tools use the configuration from pyproject.toml
# Installation: pre-commit install && pre-commit install --hook-type pre-push

minimum_pre_commit_version: "3.5.0"
default_stages: [pre-commit]
default_language_version:
  python: python3.12
fail_fast: false

# Exclude service directories (virtual environments, migrations, cache, etc.)
exclude: |
  (?x)(
    ^migrations/ |
    ^\.?venv/ |
    ^env/ |
    ^venv/ |
    ^data/ |
    ^logs/ |
    ^tmp/ |
    __pycache__/ |
    \.ruff_cache/ |
    \.mypy_cache/
  )

repos:
  # ---------------------------
  # Basic file checks (YAML, JSON, size, conflicts)
  # ---------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      # Check file size (maximum 1 MB)
      - id: check-added-large-files
        name: Check for large files
        args: ["--maxkb=1024"]

      # Check merge conflicts
      - id: check-merge-conflict
        name: Check for merge conflicts

      # Validate YAML files
      - id: check-yaml
        name: Check YAML syntax
        args: ["--unsafe"]  # Allow custom tags

      # Validate JSON files
      - id: check-json
        name: Check JSON syntax

      # Automatic correction: add an empty line at the end of the file
      - id: end-of-file-fixer
        name: Fix end of files
        # Works only with modified files (by default)

      # Automatic correction: remove trailing whitespace
      - id: trailing-whitespace
        name: Trim trailing whitespace
        args: [--markdown-linebreak-ext=md]
        # Works only with modified files (by default)

      # Search for private keys in the code
      - id: detect-private-key
        name: Detect private keys


  # ---------------------------
  # Check .env files (validation of syntax and duplicates)
  # ---------------------------
  - repo: https://github.com/dotenv-linter/dotenv-linter
    rev: v4.0.0
    hooks:
      - id: dotenv-linter
        args: ["check"]
        name: Dotenv linter
        files: "^\\.env$|^\\.env\\.(example|local|production)$"
        # Check only the main .env files (exclude .env.test via files pattern)

  # ---------------------------
  # Ruff: линтер и форматтер (использует конфиг из pyproject.toml)
  # ---------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.7.1

    hooks:
      # Ruff lint: check the entire project
      # For automatic correction add --fix to args
      - id: ruff
        name: Ruff Lint

      # Ruff format: check formatting

      - id: ruff-format
        name: Ruff Format

  # ---------------------------
  # Mypy: type checking
  # ---------------------------
  - repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.18.2
    hooks:
      - id: mypy
        name: Mypy type checker
        pass_filenames: false
        args: ["wednesday/domain", "wednesday/app", "wednesday/infra/observe/", "wednesday/infra/config/observe/", "tests/"]
        additional_dependencies:
          - redis==5.2.1
          - tenacity>=8.2.3
          - prometheus_client==0.23.1
          - pydantic==2.12.5
          - pydantic-settings==2.14.0

  # ---------------------------
  # Gitleaks: search for secrets in code (additional to basic hooks)
  # ---------------------------
  - repo: https://github.com/zricethezav/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks
        name: Gitleaks secret scanner
        pass_filenames: false

  # ---------------------------
  # Pre-push: full pytest run with coverage
  # ---------------------------
  - repo: local
    hooks:
      - id: pytest-pre-push
        name: Run pytest with coverage before push
        entry: make test-cov
        language: system
        pass_filenames: false
        stages: [pre-push]
