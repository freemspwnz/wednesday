server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /promtail/positions.yaml  # Персистентный volume

clients:
  - url: http://loki:3100/loki/api/v1/push

scrape_configs:
  - job_name: wednesday-logs
    static_configs:
      - targets:
          - localhost
        labels:
          job: wednesday-logs
          __path__: /var/lib/docker/containers/*/*-json.log
    pipeline_stages:
      # 1. Парсим docker json-file формат
      - docker: {}

      # 2. Парсим JSON из поля log (docker добавляет свои поля)
      - json:
          expressions:
            timestamp: timestamp
            level: level
            message: message
            extra: extra

      # 3. Извлекаем service и env из extra
      - json:
          source: extra
          expressions:
            service: service
            env: env
            event: event
            status: status

      # 4. Устанавливаем timestamp
      - timestamp:
          source: timestamp
          format: RFC3339

      # 5. Поднимаем только low-cardinality labels
      - labels:
          service:
          env:
          level:

      # 6. High-cardinality поля (event, status, user_id, prompt_hash) остаются в extra
      # НЕ поднимаем их в labels!
