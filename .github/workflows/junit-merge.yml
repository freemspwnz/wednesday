name: JUnit Merge

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  junit-merge:
    name: Merge JUnit Results
    runs-on: ubuntu-latest
    env:
      POETRY_VERSION: "1.8.4"
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}
          cache: "poetry"

      - name: Install Poetry
        uses: snok/install-poetry@v1
        with:
          version: ${{ env.POETRY_VERSION }}

      - name: Install dependencies
        run: poetry install --with dev --no-interaction

      - name: Download junit-all artifact
        uses: actions/download-artifact@v4
        with:
          name: junit-all
          path: junit-files
          if-no-files-found: ignore

      - name: Copy junit files
        run: |
          echo "=== Копирование JUnit файлов ==="
          find junit-files -name "junit-*.xml" -type f -exec cp {} . \;
          ls -la junit-*.xml 2>/dev/null || echo "JUnit файлы не найдены"

      - name: Check junit inputs
        id: junit-inputs
        run: |
          if ls junit-*.xml >/dev/null 2>&1; then
            echo "has_junit=true" >> "$GITHUB_OUTPUT"
          else
            echo "has_junit=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Merge JUnit XML
        if: steps.junit-inputs.outputs.has_junit == 'true'
        env:
          HOST_REPO_ROOT: ${{ github.workspace }}
        run: |
          poetry run python scripts/merge_junit.py junit.xml

      - name: Upload merged junit
        uses: codecov/test-results-action@v1
        if: ${{ !cancelled() && steps.junit-inputs.outputs.has_junit == 'true' }}
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit.xml

      - name: Upload junit XML artifact
        uses: actions/upload-artifact@v4
        if: always() && steps.junit-inputs.outputs.has_junit == 'true'
        with:
          name: junit-merged
          path: junit.xml
          retention-days: 7
