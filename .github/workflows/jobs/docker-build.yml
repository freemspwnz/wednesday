name: Docker Build

on:
  workflow_call:
    inputs:
      image-name:
        description: "Docker image name"
        required: true
        type: string

permissions:
  contents: read
  packages: write
  attestations: write
  id-token: write

jobs:
  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # определяем теги
      - name: Set tags
        id: vars
        run: |
          TAG="${GITHUB_REF##*/}"
          REPO_OWNER_LOWER=$(echo "${GITHUB_REPOSITORY_OWNER}" | tr '[:upper:]' '[:lower:]')
          echo "tag=${TAG}" >> $GITHUB_OUTPUT
          echo "latest=latest" >> $GITHUB_OUTPUT
          echo "repo_owner=${REPO_OWNER_LOWER}" >> $GITHUB_OUTPUT

      - name: Build and Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          provenance: true
          sbom: true
          tags: |
            ghcr.io/${{ steps.vars.outputs.repo_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.tag }}
            ghcr.io/${{ steps.vars.outputs.repo_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.latest }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Verify Docker image
        run: |
          # Проверяем, что runtime-данные не попали в образ
          echo "🔍 Проверка образа на runtime-данные..."
          docker run --rm ghcr.io/${{ steps.vars.outputs.repo_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.tag }} ls -la /app/data || echo "✅ /app/data не содержит runtime-данных"
          docker run --rm ghcr.io/${{ steps.vars.outputs.repo_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.tag }} test ! -d /app/logs || echo "⚠️  /app/logs существует (не должен)"

          # Проверяем, что контейнер запускается с read_only: true
          echo "🔍 Проверка read_only: true..."
          docker run --rm --read-only --tmpfs /tmp --tmpfs /var/tmp --tmpfs /root/.cache --tmpfs /run \
            ghcr.io/${{ steps.vars.outputs.repo_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.tag }} \
            python3 -c "import sys; print('✅ Контейнер работает с read_only: true')" || exit 1

          # Проверяем, что Python кеши не создаются
          echo "🔍 Проверка PYTHONDONTWRITEBYTECODE..."
          docker run --rm ghcr.io/${{ steps.vars.outputs.repo_owner }}/${{ inputs.image-name }}:${{ steps.vars.outputs.tag }} \
            python3 -c "import sys; assert sys.dont_write_bytecode == True; print('✅ PYTHONDONTWRITEBYTECODE=1 установлен')" || exit 1

          echo "✅ Все проверки Docker образа пройдены"
