services:
  postgres:
    image: postgres:16-alpine
    container_name: wednesday_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - wednesday_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: wednesday_redis
    restart: unless-stopped
    command: >
      sh -c "
      if [ -n \"$$REDIS_PASSWORD\" ]; then
        redis-server --appendonly yes --requirepass \"$$REDIS_PASSWORD\"
      else
        redis-server --appendonly yes
      fi
      "
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - wednesday_redis_data:/data
    healthcheck:
      test: >
        sh -c "
        if [ -n \"$$REDIS_PASSWORD\" ]; then
          redis-cli -a \"$$REDIS_PASSWORD\" ping
        else
          redis-cli ping
        fi
        "
      interval: 5s
      timeout: 3s
      retries: 5

  bot-init:
    image: wednesday-bot:local
    container_name: wednesday_bot_init
    restart: "no"
    # Init-контейнер запускается от root, чтобы один раз выставить права
    # на томах (logs, frog_images, prompt_storage). Основной бот потом
    # работает под пользователем app из Dockerfile.
    user: "0:0"
    volumes:
      - frog_images:/app/data/frogs
      - logs:/app/logs
      - prompt_storage:/app/data/prompts
    command: ["/bin/sh", "-lc", "mkdir -p /app/logs /app/data/frogs /app/data/prompts && chown -R app:app /app/logs /app/data/frogs /app/data/prompts"]

  bot:
    image: wednesday-bot:local
    container_name: wednesday_bot
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      bot-init:
        condition: service_completed_successfully
    env_file:
      - .env
    environment:
      # Переопределяем хосты для работы внутри docker-сети
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      # Порт HTTP‑экспортёра Prometheus (/metrics) внутри контейнера.
      # При необходимости может быть переопределён через переменную окружения.
      PROMETHEUS_EXPORTER_PORT: ${PROMETHEUS_EXPORTER_PORT:-8000}
      # Порт HTTP‑серверa healthcheck (/health) внутри контейнера.
      HEALTHCHECK_PORT: ${HEALTHCHECK_PORT:-8080}
    volumes:
      # Хранилище сгенерированных изображений жабы.
      # Внутри контейнера бот читает/пишет только в /app/data/frogs.
      - frog_images:/app/data/frogs
      # Персистентные логи приложения.
      # Внутри контейнера логгер пишет только в /app/logs.
      - logs:/app/logs
      # Хранилище промптов GigaChat (файловый fallback).
      # Внутри контейнера промпты сохраняются в /app/data/prompts.
      - prompt_storage:/app/data/prompts
    networks:
      - default
    ports:
      # Пробрасываем порт экспортёра Prometheus наружу:
      # - внутри контейнера и снаружи используется одно и то же значение,
      #   чтобы избежать путаницы при настройке Prometheus/Grafana.
      - "${PROMETHEUS_EXPORTER_PORT:-8000}:${PROMETHEUS_EXPORTER_PORT:-8000}"
      # Пробрасываем порт healthcheck наружу (по умолчанию 8080).
      - "${HEALTHCHECK_PORT:-8080}:${HEALTHCHECK_PORT:-8080}"
    healthcheck:
      # Используем встроенный python для проверки эндпоинта /health без
      # дополнительных системных утилит (curl/wget).
      test: >
        python -c "import os, sys, urllib.request;
        port = os.environ.get('HEALTHCHECK_PORT', '8080');
        url = f'http://127.0.0.1:{port}/health';
        sys.exit(0 if urllib.request.urlopen(url).getcode() == 200 else 1)"
      interval: 10s
      timeout: 5s
      retries: 3

volumes:
  wednesday_postgres_data:
  wednesday_redis_data:
  frog_images:
  logs:
  prompt_storage:
