name: Pytest Check

on:
  workflow_call:
    inputs:
      python-version:
        required: true
        type: string
    secrets:
      CODECOV_TOKEN:
        required: true

jobs:
  pytest-unit:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run unit suite (no containers)
        run: |
          pytest \
            --cov=bot \
            --cov=services \
            --cov=utils \
            --cov-report=xml:coverage-unit.xml \
            --cov-report=term \
            --cov-fail-under=50 \
            --junitxml=junit-unit.xml \
            -m "not integration and not e2e and not infra and not celery and not db and not redis and not slow"

      - name: Upload coverage (unit)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-unit.xml
          flags: unit
          fail_ci_if_error: true

      - name: Upload test results (unit)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit-unit.xml

  pytest-integration:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_ci_2024
          POSTGRES_DB: wednesdaydb_test
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 5432:5432

      redis:
        image: redis:7-alpine
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
        ports:
          - 6379:6379

    env:
      POSTGRES_USER: test_user
      POSTGRES_PASSWORD: test_password_ci_2024
      POSTGRES_DB: wednesdaydb_test
      POSTGRES_HOST: localhost
      POSTGRES_PORT: 5432
      REDIS_HOST: localhost
      REDIS_PORT: 6379
      REDIS_DB: 0
      SCHEDULER_SEND_TIMES: "09:00,12:00,18:00"
      SCHEDULER_WEDNESDAY_DAY: "2"
      SCHEDULER_TZ: "Europe/Moscow"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Wait for services to be ready
        run: |
          python -c "
          import time
          import sys
          import asyncpg
          import asyncio

          async def check_postgres():
              import os
              for i in range(10):
                  try:
                      conn = await asyncpg.connect(
                          host='localhost',
                          port=5432,
                          user=os.getenv('POSTGRES_USER', 'test_user'),
                          password=os.getenv('POSTGRES_PASSWORD', 'test_password_ci_2024'),
                          database=os.getenv('POSTGRES_DB', 'wednesdaydb_test'),
                          timeout=2,
                      )
                      await conn.close()
                      print('✓ Postgres is ready!')
                      return True
                  except Exception as e:
                      if i == 9:
                          print(f'✗ Postgres connection failed: {e}')
                          return False
                      time.sleep(1)

          import redis
          for i in range(10):
              try:
                  r = redis.Redis(host='localhost', port=6379, db=0, socket_connect_timeout=2)
                  r.ping()
                  print('✓ Redis is ready!')
                  break
              except Exception as e:
                  if i == 9:
                      print(f'✗ Redis connection failed: {e}')
                      sys.exit(1)
                  time.sleep(1)

          if not asyncio.run(check_postgres()):
              sys.exit(1)
          "

      - name: Run migrations
        env:
          POSTGRES_USER: test_user
          POSTGRES_PASSWORD: test_password_ci_2024
          POSTGRES_DB: wednesdaydb_test
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          TELEGRAM_BOT_TOKEN: "ci-dummy-token"
          KANDINSKY_API_KEY: "ci-dummy-kandinsky-key"
          KANDINSKY_SECRET_KEY: "ci-dummy-kandinsky-secret"
          CHAT_ID: "0"
          ADMIN_CHAT_ID: "0"
        run: make migrate

      - name: Run integration suite
        run: |
          pytest \
            --cov=bot \
            --cov=services \
            --cov=utils \
            --cov-report=xml:coverage-integration.xml \
            --cov-report=term \
            --cov-fail-under=50 \
            --junitxml=junit-integration.xml \
            -n auto \
            -m "(integration or db or redis) and not e2e and not infra and not slow"

      - name: Upload coverage (integration)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-integration.xml
          flags: integration
          fail_ci_if_error: true

      - name: Upload test results (integration)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit-integration.xml

  pytest-e2e-infra:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Cache pip
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run Celery infra E2E
        env:
          TELEGRAM_BOT_TOKEN: "ci-dummy-token"
          KANDINSKY_API_KEY: "ci-dummy-kandinsky-key"
          KANDINSKY_SECRET_KEY: "ci-dummy-secret"
          CHAT_ID: "0"
          ADMIN_CHAT_ID: "0"
        run: ./scripts/run_e2e.sh "e2e and infra"

      - name: Upload coverage (e2e)
        uses: codecov/codecov-action@v5
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./coverage-e2e.xml
          flags: e2e_infra
          fail_ci_if_error: true

      - name: Upload test results (e2e)
        if: ${{ !cancelled() }}
        uses: codecov/test-results-action@v1
        with:
          token: ${{ secrets.CODECOV_TOKEN }}
          files: ./junit-e2e.xml

  test-quality-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ inputs.python-version }}

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Check test quality
        run: python tests/check_test_quality.py
