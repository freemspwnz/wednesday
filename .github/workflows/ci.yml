name: CI Pipeline

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ============================================================================
  # Линтинг и проверка форматирования (параллельно)
  # ============================================================================

  lint:
    uses: ./.github/workflows/ruff-lint.yml
    with:
      python-version: ${{ vars.PYTHON_VERSION }}

  format:
    uses: ./.github/workflows/ruff-format.yml
    with:
      python-version: ${{ vars.PYTHON_VERSION }}

  mypy:
    uses: ./.github/workflows/mypy.yml
    with:
      python-version: ${{ vars.PYTHON_VERSION }}

  actionlint:
    uses: ./.github/workflows/actionlint.yml

  dependency-review:
    if: github.event_name == 'pull_request'
    uses: ./.github/workflows/dependency-review.yml

  # ============================================================================
  # Дополнительные проверки (параллельно с тестами)
  # ============================================================================

  prometheus:
    uses: ./.github/workflows/prometheus.yml

  loki-dashboards:
    uses: ./.github/workflows/loki.yml

  # ============================================================================
  # Унифицированный набор всех Pytest тестов
  # ============================================================================

  pytest:
    uses: ./.github/workflows/pytest.yml
    with:
      python-version: ${{ vars.PYTHON_VERSION }}

  # ============================================================================
  # Объединение результатов тестов
  # ============================================================================

  coverage-merge:
    uses: ./.github/workflows/coverage-merge.yml
    needs: [pytest]
    if: always()
    with:
      python-version: ${{ vars.PYTHON_VERSION }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  junit-merge:
    uses: ./.github/workflows/junit-merge.yml
    needs: [pytest]
    if: always()
    with:
      python-version: ${{ vars.PYTHON_VERSION }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Docker Build (только для тегов)
  # ============================================================================

  docker-build:
    name: Build Docker image (release only)
    needs: [lint, format, mypy, actionlint, pytest, prometheus, loki-dashboards]
    if: startsWith(github.ref, 'refs/tags/v')
    uses: ./.github/workflows/docker-build.yml
    with:
      image-name: wednesday-bot
