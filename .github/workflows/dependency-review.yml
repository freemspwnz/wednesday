name: Dependency Review

on:
  workflow_call:

permissions:
  contents: read
  pull-requests: read

jobs:
  dependency-review:
    name: Dependency review (PR only)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Run dependency review
        uses: actions/dependency-review-action@v4
