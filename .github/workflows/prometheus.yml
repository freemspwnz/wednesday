name: Prometheus Check

on:
  workflow_call:

permissions:
  contents: read

jobs:
  prometheus-check:
    name: Prometheus config checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install promtool
        run: |
          PROM_VERSION=2.54.1
          ARCHIVE="prometheus-${PROM_VERSION}.linux-amd64.tar.gz"
          curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/${ARCHIVE}" -o "/tmp/${ARCHIVE}"
          curl -fsSL "https://github.com/prometheus/prometheus/releases/download/v${PROM_VERSION}/sha256sums.txt" -o /tmp/sha256sums.txt
          (cd /tmp && awk "/${ARCHIVE//./\\.}/ {print}" sha256sums.txt > sha256-check.txt && sha256sum -c sha256-check.txt)
          tar -xzf "/tmp/${ARCHIVE}" -C /tmp
          sudo mv /tmp/prometheus-${PROM_VERSION}.linux-amd64/promtool /usr/local/bin/promtool
          promtool --version

      - name: Check Prometheus config
        run: promtool check config monitoring/prometheus/prometheus.yml

      - name: Test Prometheus rules
        run: promtool test rules monitoring/prometheus/rules/metrics-rules.test.yml
