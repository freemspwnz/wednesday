name: CI Pipeline

on:
  push:
    branches: [main]
    tags:
      - "v*"
  pull_request:
    branches: [main]

env:
  PYTHON_VERSION: "3.11"
  COMPOSE_PROJECT: wednesday_test
  COMPOSE_FILE: tests/docker-compose.test.yml
  COMPOSE_ENV: tests/.env.test

jobs:
  # ============================================================================
  # Определение типа запуска (release или обычный)
  # ============================================================================
  check_release:
    name: Check if release
    runs-on: ubuntu-latest
    outputs:
      is_tag: ${{ steps.check.outputs.is_tag }}
    steps:
      - name: Check if tag
        id: check
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]]; then
            echo "is_tag=true" >> $GITHUB_OUTPUT
          else
            echo "is_tag=false" >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Линтинг и проверка форматирования (параллельно)
  # ============================================================================

  lint:
    uses: ./.github/workflows/jobs/lint-check.yml
    with:
      python-version: ${{ env.PYTHON_VERSION }}

  format:
    uses: ./.github/workflows/jobs/format-check.yml
    with:
      python-version: ${{ env.PYTHON_VERSION }}

  mypy:
    uses: ./.github/workflows/jobs/mypy-check.yml
    with:
      python-version: ${{ env.PYTHON_VERSION }}

  # ============================================================================
  # Дополнительные проверки (параллельно с тестами)
  # ============================================================================

  prometheus:
    uses: ./.github/workflows/jobs/prometheus-check.yml

  loki-dashboards:
    uses: ./.github/workflows/jobs/loki-dashboards-check.yml

  # ============================================================================
  # Проверка документации MkDocs
  # ============================================================================

  check-docs:
    uses: ./.github/workflows/jobs/check-docs.yml
    with:
      python_version: ${{ env.PYTHON_VERSION }}

  # ============================================================================
  # Унифицированный набор всех Pytest тестов
  # ============================================================================

  pytest-full:
    uses: ./.github/workflows/jobs/pytest-full.yml
    needs: [check_release]
    with:
      python_version: ${{ env.PYTHON_VERSION }}
      compose_project: ${{ env.COMPOSE_PROJECT }}
      compose_file: ${{ env.COMPOSE_FILE }}
      compose_env: ${{ env.COMPOSE_ENV }}
      is_release: ${{ needs.check_release.outputs.is_tag == 'true' }}

  # ============================================================================
  # Объединение результатов тестов
  # ============================================================================

  coverage-merge:
    uses: ./.github/workflows/jobs/coverage-merge.yml
    needs: [pytest-full]
    if: always()
    with:
      python_version: ${{ env.PYTHON_VERSION }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  junit-merge:
    uses: ./.github/workflows/jobs/junit-merge.yml
    needs: [pytest-full]
    if: always()
    with:
      python_version: ${{ env.PYTHON_VERSION }}
    secrets:
      CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}

  # ============================================================================
  # Docker Build (только для тегов)
  # ============================================================================

  docker-build:
    name: Build Docker image (release only)
    needs: [check_release, lint, format, mypy, pytest-full, prometheus, loki-dashboards]
    if: needs.check_release.outputs.is_tag == 'true'
    uses: ./.github/workflows/jobs/docker-build.yml
    with:
      image-name: wednesday-bot

  # ============================================================================
  # Deploy MkDocs documentation to GitHub Pages (only for main branch pushes)
  # ============================================================================

  deploy-docs:
    name: "🚀 Deploy Documentation to GH Pages"
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    needs:
      - check_release
      - lint
      - format
      - mypy
      - pytest-full
      - prometheus
      - loki-dashboards
      - check-docs
    uses: ./.github/workflows/jobs/deploy-docs.yml
    with:
      python_version: ${{ env.PYTHON_VERSION }}
    secrets:
      GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
